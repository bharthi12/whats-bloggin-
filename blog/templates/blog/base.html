{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>{% block title %} Bloggin' It?{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'blog/css/output.css' %}">
</head>

<body class="bg-red-100 font-[Poppins]">

    <!-- Navigation -->

    <nav class="bg-red-500 shadow-lg">

        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">

            <a href="/"
               class="text-4xl font-extrabold text-white tracking-tight hover:text-red-100 transition">
                 Bloggin' It
            </a>

            <div class="flex items-center gap-8 text-lg">

                <a href="/"
                   class="text-white font-medium hover:text-red-100 transition">
                    Home
                </a>

                <a href="/about/"
                   class="text-white font-medium hover:text-red-100 transition">
                    About
                </a>

                <a href="/contacts/"
                   class="text-white font-medium hover:text-red-100 transition">
                    Contact
                </a>

            </div>

        </div>

    </nav>

    <!-- Page Content -->

    <main class="max-w-6xl mx-auto px-6 py-10">

        {% block content %}
        {% endblock %}

    </main>

</body>

</html>

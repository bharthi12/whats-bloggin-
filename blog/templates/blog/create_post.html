{% extends "blog/base.html" %}

{% block title %}
Create post
{% endblock %}


{% block content %}

<h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-8">
    Create New Post
</h1>

<form method="POST" action="" class="max-w-2xl space-y-6">
    {% csrf_token %}
    <!--Action "" means submit the form to the same URL-->

    <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Title</label>
        <input type="text" name="title" placeholder="Give your post a title"
               class="w-full rounded-lg border-2 border-gray-200 focus:border-red-400 focus:outline-none px-4 py-3 text-gray-800 text-lg">
    </div>

    <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Content</label>
        <textarea name="content" rows="10" placeholder="Write what's on your mind..."
                  class="w-full rounded-lg border-2 border-gray-200 focus:border-red-400 focus:outline-none px-4 py-3 text-gray-800 leading-relaxed resize-none"></textarea>
    </div>

    <button type="submit"
            class="bg-red-500 hover:bg-red-600 transition text-white font-bold rounded-lg px-8 py-3 shadow">
        Publish
    </button>

</form>

{% endblock%}

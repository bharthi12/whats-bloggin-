{% extends "blog/base.html" %}

{% block title %}
Edit Post
{% endblock %}

{% block content %}

<h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-8">
    Edit Post
</h1>

<form method="POST" class="max-w-2xl space-y-6">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Title</label>
        <input type="text" name="title" value="{{post.title}}"
               class="w-full rounded-lg border-2 border-gray-200 focus:border-red-400 focus:outline-none px-4 py-3 text-gray-800">
    </div>

    <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Content</label>
        <textarea name="content" rows="8"
                  class="w-full rounded-lg border-2 border-gray-200 focus:border-red-400 focus:outline-none px-4 py-3 text-gray-800 resize-none">{{post.content}}</textarea>
    </div>

    <button type="submit"
            class="bg-red-500 hover:bg-red-600 transition text-white font-bold rounded-lg px-8 py-3 shadow">
        Update
    </button>

</form>

{% endblock %}

{% extends "blog/base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="flex flex-col justify-center items-center min-h-screen bg-red-100">
<h1 class="text-7xl font-black text-red-500 text-center mb-4">
    Bloggin' It
</h1>

<p class="text-gray-500 text-xl text-center mb-10">
    Share your thoughts. Inspire the world.
</p>
    <div class="bg-white w-96 p-8 rounded-2xl shadow-xl">

        <h1 class="text-3xl font-bold text-center mb-6">
            Login
        </h1>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block mb-2 font-medium">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-400"
                >
            </div>

            <div>
                <label class="block mb-2 font-medium">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-400"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-red-500 text-white p-3 rounded-lg hover:bg-red-600 transition"
            >
                Login
            </button>

            <p>Do not have a account?</p>
           <a href="{% url 'register' %}"
   class="block w-full text-center bg-red-500 text-white p-3 rounded-lg hover:bg-red-600 transition">
    Sign Up
</a>


        </form>

    </div>

</div>

{% endblock %}
